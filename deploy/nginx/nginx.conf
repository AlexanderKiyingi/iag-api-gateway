# Edge reverse proxy — TLS optional (see docker-compose).
# All API routing and JWT/RBAC stay in iag-api-gateway; nginx handles transport hardening.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  # General API traffic
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  # Token endpoint — stricter (gateway also rate-limits)
  limit_req_zone $binary_remote_addr zone=oauth:10m rate=5r/s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream api_gateway {
    server api-gateway:8080;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    location = /api/v1/authentication/oauth/token {
      limit_req zone=oauth burst=15 nodelay;
      include /etc/nginx/proxy_params.conf;
      proxy_pass http://api_gateway;
    }

    location / {
      limit_req zone=api burst=60 nodelay;
      include /etc/nginx/proxy_params.conf;
      proxy_pass http://api_gateway;

      # WebSocket / SSE (notifications realtime, fleet SSE)
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
    }
  }
}
