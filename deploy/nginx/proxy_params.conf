proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# Clients must not spoof gateway principal headers — gateway re-sets after JWT verify.
proxy_set_header X-IAG-User-Id "";
proxy_set_header X-IAG-Email "";
proxy_set_header X-IAG-Groups "";
proxy_set_header X-IAG-Roles "";
proxy_set_header X-IAG-Permissions "";
proxy_set_header X-IAG-Is-Superuser "";
proxy_set_header X-IAG-Is-Staff "";
proxy_set_header X-IAG-Gateway-Secret "";
